<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#1A1815"/>
  <rect x="5" y="5" width="502" height="502" rx="103" fill="#2B2926"/>

  <!-- Gold upward arrow (left side, snake wraps around it) -->
  <polygon points="72,330 108,244 144,330" fill="#F0C04C"/>
  <rect x="95" y="325" width="28" height="130" rx="14" fill="#F0C04C"/>
  <!-- Subtle arrow glow -->
  <polygon points="72,330 108,244 144,330" fill="#ffe080" opacity="0.35"/>

  <!-- Snake S-curve body -->
  <!-- Shadow layer -->
  <path d="M256,446 C402,446 402,292 256,262 C110,232 110,110 256,72"
        stroke="#0d1a06" stroke-width="74" fill="none" stroke-linecap="round"/>
  <!-- Dark green base -->
  <path d="M256,446 C402,446 402,292 256,262 C110,232 110,110 256,72"
        stroke="#3d6e18" stroke-width="63" fill="none" stroke-linecap="round"/>
  <!-- Main bright green -->
  <path d="M256,446 C402,446 402,292 256,262 C110,232 110,110 256,72"
        stroke="#7FB94C" stroke-width="52" fill="none" stroke-linecap="round"/>
  <!-- Belly highlight stripe -->
  <path d="M256,446 C402,446 402,292 256,262 C110,232 110,110 256,72"
        stroke="#c4e88a" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.28"/>
  <!-- Scale diamond marks -->
  <path d="M256,446 C402,446 402,292 256,262 C110,232 110,110 256,72"
        stroke="#2d5210" stroke-width="52" fill="none" stroke-linecap="round"
        stroke-dasharray="2 34" opacity="0.55"/>

  <!-- Snake head -->
  <ellipse cx="256" cy="65" rx="50" ry="43" fill="#3d6e18"/>
  <ellipse cx="256" cy="65" rx="44" ry="38" fill="#6aaa30"/>
  <!-- Head top shine -->
  <ellipse cx="248" cy="52" rx="26" ry="18" fill="#a8d858" opacity="0.38"/>

  <!-- Left eye socket -->
  <circle cx="232" cy="57" r="16" fill="#0a0806"/>
  <!-- Left eye shine -->
  <circle cx="226" cy="51" r="6.5" fill="#ffffff" opacity="0.88"/>
  <!-- Left slit pupil -->
  <ellipse cx="233" cy="58" rx="5" ry="12" fill="#040302"/>

  <!-- Right eye socket -->
  <circle cx="280" cy="57" r="16" fill="#0a0806"/>
  <!-- Right eye shine -->
  <circle cx="274" cy="51" r="6.5" fill="#ffffff" opacity="0.88"/>
  <!-- Right slit pupil -->
  <ellipse cx="281" cy="58" rx="5" ry="12" fill="#040302"/>

  <!-- Nostril dots -->
  <circle cx="247" cy="74" r="4" fill="#2a5010" opacity="0.7"/>
  <circle cx="265" cy="74" r="4" fill="#2a5010" opacity="0.7"/>

  <!-- Head center ridge -->
  <path d="M244,38 Q256,33 268,38" stroke="#2a5010" stroke-width="2.5" fill="none" opacity="0.5"/>

  <!-- Forked tongue -->
  <path d="M256,100 L256,130 M256,130 L228,154 M256,130 L284,154"
        stroke="#CC2828" stroke-width="7" fill="none" stroke-linecap="round"/>
</svg>
